# Resumable upload endpoint (tus protocol).
#
# Reverse-proxy onto the Node tus server bound to 127.0.0.1:1080.
# Auth is enforced inside the tus server via the JWT in Authorization,
# so we just have to make sure nginx doesn't get in the way of large
# bodies, long-lived PATCH requests, or the tus headers.
#
# Same upstream serves Tipote (separate vhost) — the JWT carries the
# `app` claim that picks the right secret server-side.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name tus.tipote.com;

    # certbot will inject the HTTP-01 challenge here on first run
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tus.tipote.com;

    ssl_certificate     /etc/letsencrypt/live/tus.tipote.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tus.tipote.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 20 Gio max body. Streamed to upstream — never buffered to disk.
    client_max_body_size 21474836480;
    client_body_buffer_size 1m;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;

    # Long PATCHes for big chunks: 1 h is plenty even on a flaky 4G.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    send_timeout 3600s;

    # Some browsers / proxies strip these — make sure they reach Node.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location / {
        proxy_pass http://127.0.0.1:1080;
    }
}
