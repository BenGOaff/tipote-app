# Protected video playback via secure_link.
#
# Player URLs look like:
#   https://videos.tipote.com/<app>/raw/<userId>/<videoId>/source.mp4?md5=<hash>&expires=<unix>
#
# secure_link_md5 verifies $secure_link_expires + URI + secret. If the
# hash doesn't match or the timestamp is past, nginx returns 403/410.
# The Next backend mints these URLs in lib/popquiz/repo.ts using the
# same secret + expiry, so links rotate every couple of hours.
#
# We use the query-string variant rather than path-based because
# Range requests carry query strings cleanly across browsers and CDNs,
# and nginx parses them without a regex location.
#
# CORS gotcha: nginx's `add_header` directives DO NOT inherit into a
# child block once that child defines its own add_header. So every
# location that needs CORS must repeat them — we build a small list
# below and `include`-style copy it inline. The video player is on a
# different origin (quiz.tipote.com) than the file (videos.tipote.com),
# so without these the <video> element silently refuses to play.

server {
    listen 80;
    listen [::]:80;
    server_name videos.tipote.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name videos.tipote.com;

    ssl_certificate     /etc/letsencrypt/live/videos.tipote.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/videos.tipote.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    sendfile on;
    tcp_nopush on;
    aio threads;
    directio 4m;
    output_buffers 2 1m;

    root /srv/popquiz-videos;

    # Block dotfiles, tus configstore JSONs, and anything outside the
    # raw/ scope. Done before the main location so it always wins.
    location ~ /\. { deny all; }
    location ~* \.json$ { deny all; }

    # Browsers send a preflight OPTIONS for the Range header. Answer
    # it cheaply, before secure_link, so cross-origin video works.
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-None-Match, If-Modified-Since" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        # md5 hash: base64url( md5_raw( "<expires><uri> <secret>" ) )
        secure_link $arg_md5,$arg_expires;
        secure_link_md5 "$secure_link_expires$uri SECURE_LINK_SECRET_PLACEHOLDER";

        if ($secure_link = "")  { return 403; }
        if ($secure_link = "0") { return 410; }

        # Repeat ALL headers here — once nginx sees an `add_header`
        # in this block, the parent's are dropped (yes, even with
        # `always`). So we list everything we need on the response.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, If-None-Match, If-Modified-Since" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Cache-Control "private, max-age=300" always;
        add_header X-Content-Type-Options "nosniff" always;

        try_files $uri =404;
    }
}
