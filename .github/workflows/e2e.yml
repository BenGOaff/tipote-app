name: E2E Playwright

# Tests Playwright sur les routes publiques critiques (phase 7
# ROADMAP_RETENTION.md). Pas dans le CI principal car install Chromium
# = 2 min : trop cher pour chaque push. À la place :
#
#   - schedule : 1x/jour à 3h UTC (= 4h Paris hiver / 5h été)
#     → détecte les régressions silencieuses introduites par les
#       changements infra (Supabase schema cache, CDN, etc.) même
#       quand on n'a rien pushé
#   - workflow_dispatch : Béné peut lancer manuellement depuis
#     l'onglet Actions de GitHub (utile post-deploy)
#
# Variables (NON-secrètes, juste des IDs publics) à configurer dans
# GitHub → Settings → Secrets and variables → Actions → tab Variables :
#   - SMOKE_QUIZ_ID         (slug ou UUID d'un quiz actif en prod)
#   - SMOKE_POPQUIZ_ID      (id d'un popquiz actif en prod)
#   - SMOKE_PAGE_SLUG       (slug d'une page active en prod)
#   - BASE_URL (optionnel)  (https://app.tipote.com par défaut, override)
#
# Si une variable manque : les tests correspondants sont SKIPPÉS (via
# test.skip dans les specs) — pas d'échec, juste rien à vérifier.

on:
  schedule:
    # Cron syntax : minute hour day month day-of-week
    # 3h UTC = 4h Paris l'hiver / 5h Paris l'été (heure creuse)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL cible (par défaut https://app.tipote.com)"
        required: false
        default: ""

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.6"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: ${{ inputs.base_url || vars.BASE_URL || 'https://app.tipote.com' }}
          SMOKE_QUIZ_ID: ${{ vars.SMOKE_QUIZ_ID }}
          SMOKE_POPQUIZ_ID: ${{ vars.SMOKE_POPQUIZ_ID }}
          SMOKE_PAGE_SLUG: ${{ vars.SMOKE_PAGE_SLUG }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
